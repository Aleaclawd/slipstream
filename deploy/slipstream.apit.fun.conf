# nginx vhost for slipstream.apit.fun — mirrors the other apit.fun app vhosts on hetzner1.
# Install:  sudo cp deploy/slipstream.apit.fun.conf /etc/nginx/sites-available/slipstream.apit.fun
#           sudo ln -s ../sites-available/slipstream.apit.fun /etc/nginx/sites-enabled/slipstream.apit.fun
#           sudo nginx -t && sudo systemctl reload nginx
# Slipstream runs under pm2 on 127.0.0.1:3210 (see ecosystem.config.cjs).

server {
    listen 80;
    listen [::]:80;
    server_name slipstream.apit.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # Match the listen address used by the other apit.fun vhosts on this host.
    listen 100.124.131.86:80;
    listen 100.124.131.86:443 ssl;
    server_name slipstream.apit.fun;

    # Shared host cert. Swap to the wildcard *.apit.fun Let's Encrypt cert if preferred.
    ssl_certificate /etc/ssl/certs/porsche-game.crt;
    ssl_certificate_key /etc/ssl/private/porsche-game.key;

    location / {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
