# studio.911fund.io — PRIVATE (Tailscale-only). Serves Slipstream at /slipstream/.
#
# Binds the Tailscale IP (100.124.131.86) ONLY — never the public interface — mirroring
# studio.apit.fun / jose.911fund.io. The pm2 app also binds the Tailscale IP, so the whole
# path is tailnet-internal. Not exposed to the public internet.
#
# studio.911fund.io must resolve to 100.124.131.86 for tailnet devices — use a Cloudflare
# DNS-only (grey-cloud) A record, Tailscale MagicDNS, or per-device /etc/hosts (see DEPLOY.md).
#
# Apply (owner, needs sudo):
#   sudo cp deploy/studio.911fund.io.conf /etc/nginx/sites-available/studio.911fund.io
#   sudo ln -s ../sites-available/studio.911fund.io /etc/nginx/sites-enabled/studio.911fund.io
#   sudo nginx -t && sudo systemctl reload nginx
#   # from a tailnet device:
#   curl -k https://studio.911fund.io/slipstream/api/health

server {
    listen 100.124.131.86:80;
    listen 100.124.131.86:443 ssl;
    server_name studio.911fund.io;

    # Self-signed origin cert (private service — browsers warn; that's expected over Tailscale).
    ssl_certificate /etc/ssl/certs/porsche-game.crt;
    ssl_certificate_key /etc/ssl/private/porsche-game.key;

    location ~ /\.(env|git) { deny all; return 404; }
    location ~ \.md$ { deny all; return 404; }

    # Slipstream at /slipstream/  (trailing slash on proxy_pass strips the prefix)
    location = /slipstream { return 301 /slipstream/; }
    location /slipstream/ {
        proxy_pass http://100.124.131.86:3210/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Bare domain → Slipstream. Remove if you later host something else at the root.
    location = / { return 301 /slipstream/; }
}
