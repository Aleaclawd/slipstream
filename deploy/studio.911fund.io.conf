# studio.911fund.io — serves Slipstream at the root (reverse proxy → pm2 on :3210).
# Mirrors the other 911fund.io subdomain vhosts (Cloudflare-proxied, origin cert
# porsche-game.crt). The Node server handles both the SPA and the /api routes.
#
# Apply (owner, needs sudo) AFTER the Cloudflare DNS record for studio.911fund.io exists:
#   sudo cp deploy/studio.911fund.io.conf /etc/nginx/sites-available/studio.911fund.io
#   sudo ln -s ../sites-available/studio.911fund.io /etc/nginx/sites-enabled/studio.911fund.io
#   sudo nginx -t && sudo systemctl reload nginx
#   curl -sk https://studio.911fund.io/api/health

server {
    server_name studio.911fund.io;

    location ~ /\.(env|git) { deny all; return 404; }
    location ~ \.md$ { deny all; return 404; }

    location / {
        proxy_pass http://127.0.0.1:3210;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen 443 ssl;
    ssl_certificate /etc/ssl/certs/porsche-game.crt;
    ssl_certificate_key /etc/ssl/private/porsche-game.key;
}

server {
    if ($host = studio.911fund.io) {
        return 301 https://$host$request_uri;
    }
    server_name studio.911fund.io;
    listen 80;
    return 404;
}
