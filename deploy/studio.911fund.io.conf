# studio.911fund.io — serves Slipstream at /slipstream/ (reverse proxy → pm2 on :3210).
# New subdomain on 911fund.io (Cloudflare-proxied; origin cert porsche-game.crt).
# The Node server handles both the SPA and /api; the app uses relative paths so it
# works correctly under the /slipstream/ prefix.
#
# Apply (owner, needs sudo) AFTER the Cloudflare DNS record for studio.911fund.io exists:
#   sudo cp deploy/studio.911fund.io.conf /etc/nginx/sites-available/studio.911fund.io
#   sudo ln -s ../sites-available/studio.911fund.io /etc/nginx/sites-enabled/studio.911fund.io
#   sudo nginx -t && sudo systemctl reload nginx
#   curl -sk https://studio.911fund.io/slipstream/api/health

server {
    server_name studio.911fund.io;

    location ~ /\.(env|git) { deny all; return 404; }
    location ~ \.md$ { deny all; return 404; }

    # Slipstream at /slipstream/  (trailing slash on proxy_pass strips the prefix)
    location = /slipstream { return 301 /slipstream/; }
    location /slipstream/ {
        proxy_pass http://127.0.0.1:3210/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Bare domain → Slipstream. Remove this if you later host something else at the root.
    location = / { return 301 /slipstream/; }

    listen 443 ssl;
    ssl_certificate /etc/ssl/certs/porsche-game.crt;
    ssl_certificate_key /etc/ssl/private/porsche-game.key;
}

server {
    if ($host = studio.911fund.io) {
        return 301 https://$host$request_uri;
    }
    server_name studio.911fund.io;
    listen 80;
    return 404;
}
