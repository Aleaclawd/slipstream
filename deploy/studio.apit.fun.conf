# studio.apit.fun — existing Paperclip studio vhost, WITH Slipstream added at /slipstream/.
#
# This is the full current studio vhost; the ONLY addition is the `/slipstream/` location in
# the Tailscale-bound (100.124.131.86) server block. So Slipstream is served on the same
# private interface as the studio — Tailscale-only, no DNS change, no new cert. The studio at
# `/` (→ 127.0.0.1:3100) is untouched.
#
# Apply (owner, needs sudo):
#   sudo cp deploy/studio.apit.fun.conf /etc/nginx/sites-available/studio.apit.fun
#   sudo nginx -t && sudo systemctl reload nginx
#   # from a tailnet device:
#   curl -k https://studio.apit.fun/slipstream/api/health

server {
    listen 80;
    listen [::]:80;
    server_name studio.apit.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 100.124.131.86:80;
    listen 100.124.131.86:443 ssl;
    server_name studio.apit.fun;

    ssl_certificate /etc/ssl/certs/porsche-game.crt;
    ssl_certificate_key /etc/ssl/private/porsche-game.key;

    # --- Slipstream (technical-sales execution copilot) — pm2 on the Tailscale IP :3210 ---
    # Longest-prefix match: /slipstream/* is served here, the studio stays on `/`.
    location = /slipstream { return 301 /slipstream/; }
    location /slipstream/ {
        proxy_pass http://100.124.131.86:3210/;   # trailing slash strips the /slipstream/ prefix
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- existing studio (Paperclip) — untouched ---
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
