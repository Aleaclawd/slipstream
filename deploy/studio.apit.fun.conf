# studio.apit.fun — exact copy of the LIVE vhost (/etc/nginx/sites-enabled/studio.apit.fun)
# with ONE addition: the `/slipstream/` location in the Tailscale-bound server block.
# Studio at `/` (→ 127.0.0.1:3100) and the Let's Encrypt cert are preserved verbatim.
#
# NOTE: studio.apit.fun is enabled as a real file in sites-enabled/ (not a symlink), and that
# is the file nginx loads — so copy over THAT path:
#
#   sudo cp deploy/studio.apit.fun.conf /etc/nginx/sites-enabled/studio.apit.fun
#   sudo nginx -t && sudo systemctl reload nginx
#   curl https://studio.apit.fun/slipstream/api/health    # from a tailnet device

server {
    listen 80;
    listen [::]:80;
    server_name studio.apit.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 100.124.131.86:80;
    listen 100.124.131.86:443 ssl;
    server_name studio.apit.fun;

    ssl_certificate /etc/letsencrypt/live/apit.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apit.fun/privkey.pem;

    # --- Slipstream (technical-sales execution copilot) — pm2 on the Tailscale IP :3210 ---
    # Longest-prefix match: /slipstream/* is served here, the studio stays on `/`.
    location = /slipstream { return 301 /slipstream/; }
    location /slipstream/ {
        proxy_pass http://100.124.131.86:3210/;   # trailing slash strips the /slipstream/ prefix
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- existing studio (Paperclip) — untouched ---
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
