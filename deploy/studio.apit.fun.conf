# studio.apit.fun — the existing Paperclip studio vhost, WITH Slipstream mounted at /slipstream/.
# This is the full file: it preserves the current studio config and only adds the
# `/slipstream/` location (→ pm2 on 127.0.0.1:3210). No DNS or cert changes —
# studio.apit.fun already resolves with TLS.
#
# Apply (owner, needs sudo):
#   sudo cp deploy/studio.apit.fun.conf /etc/nginx/sites-available/studio.apit.fun
#   sudo nginx -t && sudo systemctl reload nginx
#   curl -s https://studio.apit.fun/slipstream/api/health

server {
    listen 80;
    listen [::]:80;
    server_name studio.apit.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 100.124.131.86:80;
    listen 100.124.131.86:443 ssl;
    server_name studio.apit.fun;

    ssl_certificate /etc/ssl/certs/porsche-game.crt;
    ssl_certificate_key /etc/ssl/private/porsche-game.key;

    # --- Slipstream (technical-sales execution copilot) — pm2 on :3210 ---
    # Longest-prefix match means /slipstream/* is handled here, not by `location /`.
    location = /slipstream { return 301 /slipstream/; }
    location /slipstream/ {
        proxy_pass http://127.0.0.1:3210/;   # trailing slash strips the /slipstream/ prefix
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- existing studio (Paperclip) ---
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
